services:
  - type: web
    name: usama-abrar-api
    runtime: docker
    repo: https://github.com/UsamaAbrar001/UsamaAbrar001
    dockerfilePath: ./backend/Dockerfile
    plan: free
    envVars:
      - key: PORT
        value: 5000
      - key: DATABASE_URL
        fromDatabase:
          name: usama-abrar-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: CORS_ORIGIN
        value: https://usama-abrar.onrender.com

  - type: web
    name: usama-abrar
    runtime: static
    repo: https://github.com/UsamaAbrar001/UsamaAbrar001
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: ./frontend/dist
    pullRequestPreviewsEnabled: true
    envVars:
      - key: VITE_API_URL
        value: https://usama-abrar-api.onrender.com

databases:
  - name: usama-abrar-db
    databaseName: usamaabrardb
    plan: free
