services:
  db:
    image: postgres:16-alpine
    container_name: usama-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: usama_portfolio
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: usama-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      DATABASE_URL: postgresql://postgres:postgres@db:5432/usama_portfolio
      JWT_SECRET: your-super-secret-jwt-key-change-in-production
      JWT_EXPIRES_IN: 7d
      CORS_ORIGIN: http://localhost:5173
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - uploads:/app/src/uploads

  frontend:
    build: ./frontend
    container_name: usama-frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    environment:
      VITE_PROXY_TARGET: http://backend:5000
    depends_on:
      - backend

volumes:
  pgdata:
  uploads:
